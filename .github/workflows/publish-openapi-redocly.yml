name: Publish OpenAPI Spec to Redocly

on:
  workflow_call:
    secrets:
      REDOCLY_AUTHORIZATION:
        required: true
    inputs:
      upload_artifact_name:
        required: true
        type: string
      api_version:
        required: true
        type: string
      redocly_organization:
        required: true
        type: string
      api_name:
        required: true
        type: string
      mount_path:
        required: false
        type: string
        default: /openapi.yaml
      is_release:
        required: false
        type: boolean
        default: false

jobs:
  Push-API-to-Redocly:
    runs-on: ubuntu-latest
    steps:
      - name: Download versioned OpenAPI spec artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.upload_artifact_name }}
          path: /tmp/openapi-spec

      - name: Resolve spec file path
        id: spec
        run: |
          SPEC_FILE=$(find /tmp/openapi-spec -name "*.yml" -o -name "*.yaml" | head -1)
          echo "path=$SPEC_FILE" >> "$GITHUB_OUTPUT"

      - name: Push spec to Redocly (draft)
        if: ${{ !inputs.is_release }}
        env:
          REDOCLY_AUTHORIZATION: ${{ secrets.REDOCLY_AUTHORIZATION }}
        run: |
          npx @redocly/cli@latest push "${{ steps.spec.outputs.path }}" \
            --organization ${{ inputs.redocly_organization }} \
            --project ${{ inputs.api_name }} \
            --mount-path ${{ inputs.mount_path }} \
            --branch draft \
            --author "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>" \
            --message "chore: publish draft spec ${{ inputs.api_version }} [skip ci]"

      - name: Push spec to Redocly (release)
        if: ${{ inputs.is_release }}
        env:
          REDOCLY_AUTHORIZATION: ${{ secrets.REDOCLY_AUTHORIZATION }}
        run: |
          npx @redocly/cli@latest push "${{ steps.spec.outputs.path }}" \
            --organization ${{ inputs.redocly_organization }} \
            --project ${{ inputs.api_name }} \
            --mount-path ${{ inputs.mount_path }} \
            --author "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>" \
            --message "chore: publish release spec ${{ inputs.api_version }} [skip ci]"